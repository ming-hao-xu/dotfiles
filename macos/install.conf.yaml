- defaults:
    link:
      create: true
      relink: true
      backup: true
    shell:
      stdout: true
      stderr: true
      quiet: true

- shell:
    - command: |
        set -e
        brew_bin=/opt/homebrew/bin/brew
        if [ ! -x "$brew_bin" ]; then
          homebrew_install="$(mktemp)"
          trap 'rm -f "$homebrew_install"' EXIT
          curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh -o "$homebrew_install"
          NONINTERACTIVE=1 /bin/bash "$homebrew_install"
        fi

        if [ ! -x "$brew_bin" ]; then
          printf '%s\n' 'Homebrew install completed, but brew was not found at /opt/homebrew/bin/brew.' >&2
          exit 1
        fi

        brew_shellenv="$("$brew_bin" shellenv)"
        eval "$brew_shellenv"
        brew bundle install --file="${DOTFILES_BREWFILE:-macos/Brewfile}"
        brew completions link >/dev/null
      description: Install Homebrew packages

- create:
    ~/.ssh:
      mode: 0700
    ~/.cache/zsh:
    ~/.cache/oh-my-zsh:
    ~/.local/state/zsh:
    ~/.local/share/tmux/plugins/catppuccin:

- clean:
    ~/:
    ~/.config:
      recursive: true

- link:
    ~/.zshenv: config/zsh/.zshenv
    ~/.config/zsh: config/zsh
    ~/.config/bat/config: config/bat/config
    ~/.config/starship/starship.toml: config/starship/starship.toml
    ~/.config/ghostty/config: config/ghostty/config
    ~/.hushlogin: config/hushlogin
    ~/.config/tmux/tmux.conf: config/tmux/tmux.conf
    ~/.config/git/config: config/git/config
    ~/.config/fd/ignore: macos/config/fd/ignore
    ~/.config/gh/config.yml: config/gh/config.yml
    ~/.config/homebrew/brew.env: config/homebrew/brew.env
    ~/.config/fzf/fzf.zsh: config/fzf/fzf.zsh

- shell:
    - |
      set -e

      clone_repo() {
        name=$1
        url=$2
        dest=$3
        shift 3

        if [ -d "$dest/.git" ]; then
          return 0
        fi

        if [ -e "$dest" ]; then
          printf '%s exists but is not a git checkout: %s\n' "$name" "$dest" >&2
          exit 1
        fi

        printf 'Installing %s\n' "$name"
        git clone --quiet --depth 1 "$@" "$url" "$dest"
      }

      clone_repo "Oh My Zsh" https://github.com/ohmyzsh/ohmyzsh.git "$HOME/.oh-my-zsh"
      test -f "$HOME/.oh-my-zsh/oh-my-zsh.sh"
      clone_repo "autoupdate plugin" https://github.com/TamCore/autoupdate-oh-my-zsh-plugins "$HOME/.oh-my-zsh/custom/plugins/autoupdate"
      clone_repo "you-should-use plugin" https://github.com/MichaelAquilina/zsh-you-should-use.git "$HOME/.oh-my-zsh/custom/plugins/you-should-use"
      clone_repo "zsh-autosuggestions plugin" https://github.com/zsh-users/zsh-autosuggestions "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
      clone_repo "zsh-syntax-highlighting plugin" https://github.com/zsh-users/zsh-syntax-highlighting.git "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
      clone_repo "zsh-completions plugin" https://github.com/zsh-users/zsh-completions "$HOME/.oh-my-zsh/custom/plugins/zsh-completions"

      bat_theme_dir="$(bat --config-dir)/themes"
      mkdir -p "$bat_theme_dir"
      if [ ! -f "$bat_theme_dir/Catppuccin Mocha.tmTheme" ]; then
        printf '%s\n' 'Installing Catppuccin bat theme'
        curl -fsSL https://raw.githubusercontent.com/catppuccin/bat/main/themes/Catppuccin%20Mocha.tmTheme -o "$bat_theme_dir/Catppuccin Mocha.tmTheme"
      fi
      bat cache --build >/dev/null

      clone_repo "Catppuccin tmux theme" https://github.com/catppuccin/tmux.git "$HOME/.local/share/tmux/plugins/catppuccin/tmux" --branch v2.3.0
      test -f "$HOME/.local/share/tmux/plugins/catppuccin/tmux/catppuccin.tmux"
